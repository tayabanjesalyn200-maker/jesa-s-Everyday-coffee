<style>

body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: 
    radial-gradient(circle, #00ffff 1.5px, transparent 1.5px),
    radial-gradient(circle, #0099ff 1.5px, transparent 1.5px),
    radial-gradient(circle, #bd00ff 1.5px, transparent 1.5px);
  background-size: 45px 45px;
  background-position: 0 0, 22px 22px, 12px 12px;
  animation: glitterMove 8s linear infinite;
  opacity: 0.5;
  pointer-events: none;
  z-index: 0;
}

body {
background-color:#0d1117;
font-family: 'Quicksand', sans-serif;
text-align: center;
margin: 0;
position: relative;
min-height: 100vh;
box-shadow: inset 0 0 150px 60px rgba(0, 183, 255, 0.4), inset 0 0 250px 100px rgba(189, 0, 255, 0.2);
animation: glowBg 3s infinite alternate ease-in-out;
}

h1 {
font-family: 'Quicksand', sans-serif;
font-weight: bold;
font-size: 2.5em;
color:#00ffff;
margin-top: 20px;
text-shadow: 0 0 10px #00ffff, 0 0 20px #0099ff, 0 0 30px #bd00ff, 0 0 40px #ff0080;
position: relative;
z-index: 1;
animation: textGlow 2s infinite alternate ease-in-out;
}

nav {
position: relative;
z-index: 1;
}

nav a {
text-decoration: none;
color: #ffffff;
font-weight: bold;
margin: 10px;
padding: 8px 12px;
border-radius: 12px;
background-color: #1a1f2e;
border: 1px solid #ff0080;
transition: 0.3s;
position: relative;
z-index: 1;
}

nav a:hover {
background-color:#00ffff;
color:#0d1117;
box-shadow: 0 0 15px #00ffff,0 0 25px #0099ff
}

hr {
border: 1px solid #0099ff;
box-shadow: 0 0 10px #0099ff, 0 0 20px #bd00ff;
margin: 20px auto;
max-width: 90%;
position: relative;
z-index: 1;
}

/* ✅ NEW STYLE: GRID LAYOUT PARA SA 6 PICS ✅ */
.gallery-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 25px;
  padding: 20px;
  max-width: 1200px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

.env-card {
  background-color:#1a1f2e;
  border-radius:25px;
  padding: 20px;
  border: 2px solid transparent;
  background-clip: padding-box;
  position: relative;
  overflow: hidden;
  transition: all 0.4s ease;
}

.env-card::before {
  content: '';
  position: absolute;
  inset: -2px;
  background: linear-gradient(45deg, #00ffff, #bd00ff, #ff0080, #00ffff);
  border-radius: 25px;
  z-index: -1;
  animation: borderGlow 4s linear infinite;
}

.env-card:hover {
  transform: translateY(-10px) scale(1.02);
  box-shadow: 0 10px 30px rgba(0,255,255,0.3);
}

.env-card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 15px;
  border: 2px solid #00ffff;
  margin-bottom: 15px;
  box-shadow: 0 0 15px rgba(0,255,255,0.4);
}

.env-card p {
  color: #ffffff;
  font-size: 18px;
  text-shadow: 0 0 5px #00ffff;
  margin: 0;
}

.env-card b {
  color: #00ffff;
  font-size: 22px;
  display: block;
  margin-bottom: 8px;
  text-shadow: 0 0 10px #00ffff;
}

@keyframes glitterMove {
  0% { transform: translate(0, 0); }
  100% { transform: translate(45px, 45px); }
}

@keyframes glowBg {
  from { box-shadow: inset 0 0 70px 30px rgba(0, 183, 255, 0.3); }
  to { box-shadow: inset 0 0 120px 60px rgba(0, 183, 255, 0.6); }
}

@keyframes textGlow {
  from { text-shadow: 0 0 10px #00ffff, 0 0 20px #0099ff; }
  to { text-shadow: 0 0 20px #00ffff, 0 0 40px #bd00ff, 0 0 60px #ff0080; }
}

@keyframes borderGlow {
  0% { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}

</style>
</head>
