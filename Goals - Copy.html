<!DOCTYPE html>

<head>
<title> Jesalyn - My goals</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand&display=swap" rel="stylesheet">
<style>
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: 
    radial-gradient(circle, #00ffff 1.5px, transparent 1.5px),
    radial-gradient(circle, #0099ff 1.5px, transparent 1.5px),
    radial-gradient(circle, #bd00ff 1.5px, transparent 1.5px);
  background-size: 45px 45px;
  background-position: 0 0, 22px 22px, 12px 12px;
  animation: glitterMove 8s linear infinite;
  opacity: 0.5;
  pointer-events: none;
  z-index: 0;
}

body {
background-color:#0d1117;
font-family: 'Quicksand', sans-serif;
text-align: center;
margin: 0;
position: relative;
min-height: 100vh;
box-shadow: inset 0 0 150px 60px rgba(0, 183, 255, 0.4), inset 0 0 250px 100px rgba(189, 0, 255, 0.2);
animation: glowBg 3s infinite alternate ease-in-out;
}

h1 {
font-family: 'Quicksand', sans-serif;
font-weight: bold;
font-size: 3rem;
color:#00ffff;
margin-top: 20px;
text-shadow: 0 0 10px #00ffff, 0 0 20px #0099ff, 0 0 30px #bd00ff, 0 0 40px #ff0080;
position: relative;
z-index: 1;
animation: textGlow 2s infinite alternate ease-in-out;
}

nav {
position: relative;
z-index: 1;
}

nav a {
text-decoration: none;
color: #ffffff;
font-weight: bold;
margin: 10px;
padding: 8px 12px;
border-radius: 12px;
background-color: #1a1f2e;
border: 1px solid #ff0080;
transition: 0.3s;
position: relative;
z-index: 1;
}

nav a:hover {
background-color:#00ffff;
color:#0d1117;
box-shadow: 0 0 15px #00ffff, 0 0 25px #0099ff;
}

hr {
border: 1px solid #0099ff;
box-shadow: 0 0 10px #0099ff, 0 0 20px #bd00ff;
margin: 20px auto;
max-width: 80%;
position: relative;
z-index: 1;
}

.scrapbook {
display: flex;
flex-wrap: wrap;
justify-content: center;
margin: 20px;
position: relative;
z-index: 1;
}

.card {
background-color:#1a1f2e;
border: 2px solid transparent;
background-clip: padding-box;
border-radius:20px;
width: 320px; /* Pinalaki ko para kasya */
margin: 15px;
padding: 25px;
animation: cardGlow 1.5s infinite alternate ease-in-out;
transition: all 0.3s ease;
color: #e0e0e0;
position: relative;
overflow: hidden;
cursor: pointer;
}

.card::before {
  content: '';
  position: absolute;
  top: -2px;
  left: -2px;
  right: -2px;
  bottom: -2px;
  background: linear-gradient(45deg, #00ffff, #0099ff, #bd00ff, #ff0080, #00ffff);
  border-radius: 20px;
  z-index: -1;
  animation: borderColor 3s linear infinite;
}

.card:hover {
transform: rotate(-2deg) scale(1.05);
}

.card:active {
transform: scale(0.98);
box-shadow: 0 0 70px #ff0080, 0 0 150px #ff0080, 0 0 200px #ff0080 !important;
border-color: #ff0080 !important;
}

/* ✅ MEDYO MALAKI NA YUNG PICTURE DITO ✅ */
.card img {
width: 100%;
height: 280px; /* Sakto na medyo malaki */
object-fit: cover;
border-radius: 18px;
margin-bottom: 15px;
border: 2px solid #00ffff;
box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
display: block;
}

.card p {
text-align: center;
font-size: 20px; 
line-height: 1.8;
color: #ffffff;
text-shadow: 0 0 5px #00ffff;
}

.card b {
color: #00ffff;
font-size: 22px;
text-shadow: 0 0 8px #00ffff, 0 0 15px #ff0080;
}

.emoji {
font-size: 20px;
margin-right: 5px;
}

@keyframes glitterMove {
  0% { transform: translate(0, 0); }
  100% { transform: translate(45px, 45px); }
}

@keyframes glowBg {
  from { box-shadow: inset 0 0 70px 30px rgba(0, 183, 255, 0.3); }
  to { box-shadow: inset 0 0 120px 60px rgba(0, 183, 255, 0.6); }
}

@keyframes textGlow {
  from { text-shadow: 0 0 10px #00ffff, 0 0 20px #0099ff; }
  to { text-shadow: 0 0 20px #00ffff, 0 0 40px #bd00ff, 0 0 60px #ff0080; }
}

@keyframes cardGlow {
  0% { box-shadow: 0 0 30px #00ffff, 0 0 60px #0099ff; }
  50% { box-shadow: 0 0 40px #bd00ff, 0 0 80px #ff0080; }
  100% { box-shadow: 0 0 35px #ff0080, 0 0 70px #00ffff; }
}

@keyframes borderColor {
  0% { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}
</style>
</head>
