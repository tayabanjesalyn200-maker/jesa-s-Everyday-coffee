
<!DOCTYPE html>

<head>
<title>Welcome to Jesa's Everyday Coffee - Contact Info</title>

<style>

/* ✅ BACKGROUND GLITTER PINK THEME */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: 
    radial-gradient(circle, #ffc0cb 1.5px, transparent 1.5px),
    radial-gradient(circle, #ffb6c1 1.5px, transparent 1.5px),
    radial-gradient(circle, #ff69b4 1.5px, transparent 1.5px);
  background-size: 45px 45px, 60px 60px, 35px 35px;
  background-position: 0 0, 22px 22px, 12px 12px;
  animation: glitterMove 8s linear infinite;
  opacity: 0.7;
  pointer-events: none;
  z-index: 0;
}

body {
background-color:#1a0a14;
font-family: 'Quicksand', sans-serif;
text-align: center;
margin: 0;
position: relative;
min-height: 100vh;
box-shadow: inset 0 0 150px 60px rgba(255, 192, 203, 0.4), inset 0 0 250px 100px rgba(255, 105, 180, 0.2);
animation: glowBg 3s infinite alternate ease-in-out;
}

h1 {
font-family: 'Quicksand', sans-serif;
font-weight: bold;
font-size: 2.8em;
color:#ffc0cb;
margin-top: 20px;
text-shadow: 0 0 15px #ffc0cb, 0 0 30px #ff69b4, 0 0 45px #ff1493;
position: relative;
z-index: 1;
animation: textGlow 2s infinite alternate ease-in-out;
}

nav {
position: relative;
z-index: 1;
margin: 20px 0;
}

nav a {
text-decoration: none;
color: #1a0a14;
font-weight: bold;
margin: 8px;
padding: 10px 15px;
border-radius: 12px;
background-color: #ffc0cb !important;
border: 2px solid #ff69b4;
transition: 0.3s;
position: relative;
z-index: 1;
box-shadow: 0 0 10px #ffc0cb, 0 0 20px #ff69b4;
}

nav a:hover {
background-color:#ff69b4 !important;
color:#ffffff;
box-shadow: 0 0 15px #ff69b4,0 0 25px #ff1493;
transform: scale(1.05);
}

hr {
border: 1px solid #ff69b4;
box-shadow: 0 0 10px #ff69b4, 0 0 20px #ffc0cb;
margin: 20px auto;
max-width: 90%;
position: relative;
z-index: 1;
}

/* ✅ LAYOUT PARA SA 3 BOX MAGKATABI */
.contact-wrapper {
display: flex;
justify-content: center;
align-items: stretch;
gap: 25px;
flex-wrap: wrap;
margin: 40px auto;
position: relative;
z-index: 1;
max-width: 1200px;
}

/* ✅ DESIGN NG BAWAT BOX */
.social-card {
background-color:#2d1222 !important;
border: 3px solid;
border-radius:20px;
width: 320px;
padding:20px;
animation: cardGlow 1.5s infinite alternate ease-in-out, bounce 1s infinite ease-in-out, borderColor 3s infinite linear;
transition: all 0.3s ease;
color: #ffffff;
position: relative;
overflow: hidden;
cursor: pointer;
}

.social-card::before {
  content: '';
  position: absolute;
  top: -2px;
  left: -2px;
  right: -2px;
  bottom: -2px;
  background: linear-gradient(45deg, #ffc0cb, #ff69b4, #ff1493, #ff0080, #ffc0cb);
  border-radius: 20px;
  z-index: -1;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.social-card:hover {
transform: scale(1.03);
border-color: transparent;
box-shadow: 0 0 80px #ff69b4, 0 0 150px #ff1493, 0 0 100px #ff0080;
}

.social-card:hover::before {
  opacity: 1;
}

.social-card h2 {
color: #ffc0cb;
font-size: 1.8rem;
margin-bottom: 15px;
text-shadow: 0 0 10px #ffc0cb, 0 0 20px #ff69b4;
}

/* ✅ LUGAR PANG-SCREENSHOT */
.social-img {
width: 100%;
height: 250px;
object-fit: cover;
border-radius: 15px;
margin: 10px 0;
border: 2px solid #ffc0cb;
box-shadow: 0 0 15px rgba(255, 192, 203, 0.5);
}

/* ✅ NAME SA BABA */
.social-name {
font-size: 18px;
font-weight: bold;
margin-top: 15px;
color: #ffc0cb;
text-shadow: 0 0 8px #ff69b4;
}

/* ✅ KEYFRAMES */
@keyframes glitterMove {
  0% { transform: translate(0, 0); }
  100% { transform: translate(45px, 45px); }
}

@keyframes glowBg {
  from { box-shadow: inset 0 0 70px 30px rgba(255, 192, 203, 0.3); }
  to { box-shadow: inset 0 0 120px 60px rgba(255, 105, 180, 0.5); }
}

@keyframes textGlow {
  from { text-shadow: 0 0 15px #ffc0cb, 0 0 30px #ff69b4; }
  to { text-shadow: 0 0 25px #ff69b4, 0 0 50px #ff1493, 0 0 75px #ff0080; }
}

@keyframes cardGlow {
  0% { box-shadow: 0 0 30px #ffc0cb, 0 0 60px rgba(255, 192, 203, 0.5); }
  50% { box-shadow: 0 0 30px #ff69b4, 0 0 60px rgba(255, 105, 180, 0.5); }
  100% { box-shadow: 0 0 30px #ff1493, 0 0 60px rgba(255, 20, 147, 0.5); }
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

@keyframes borderColor {
  0% { border-color: #ffc0cb; }
  25% { border-color: #ff69b4; }
  50% { border-color: #ff1493; }
  75% { border-color: #ff0080; }
  100% { border-color: #ffc0cb; }
}

</style>
</head>
