<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
<style>

body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: 
    radial-gradient(circle, #00ffff 1.5px, transparent 1.5px),
    radial-gradient(circle, #0099ff 1.5px, transparent 1.5px),
    radial-gradient(circle, #bd00ff 1.5px, transparent 1.5px);
  background-size: 45px 45px;
  background-position: 0 0, 22px 22px, 12px 12px;
  animation: glitterMove 8s linear infinite;
  opacity: 0.5;
  pointer-events: none;
  z-index: 0;
}

body {
background-color:#0d1117;
font-family: 'Quicksand', sans-serif;
text-align: center;
margin: 0;
position: relative;
min-height: 100vh;
box-shadow: inset 0 0 150px 60px rgba(0, 183, 255, 0.4), inset 0 0 250px 100px rgba(189, 0, 255, 0.2);
animation: glowBg 3s infinite alternate ease-in-out;
}

h1 {
font-family: 'Quicksand', sans-serif;
font-weight: bold;
font-size: 3rem;
color:#00ffff;
margin-top: 20px;
text-shadow: 0 0 10px #00ffff, 0 0 20px #0099ff, 0 0 30px #bd00ff, 0 0 40px #ff0080;
position: relative;
z-index: 1;
animation: textGlow 2s infinite alternate ease-in-out;
}

nav {
position: relative;
z-index: 1;
}

nav a {
text-decoration: none;
color: #ffffff;
font-weight: bold;
margin: 10px;
padding: 8px 12px;
border-radius: 12px;
background-color: #1a1f2e;
border: 1px solid #ff0080;
transition: 0.3s;
position: relative;
z-index: 1;
}

nav a:hover {
background-color:#00ffff;
color:#0d1117;
box-shadow: 0 0 15px #00ffff,0 0 25px #0099ff
}

hr {
border: 1px solid #0099ff;
box-shadow: 0 0 10px #0099ff, 0 0 20px #bd00ff;
margin: 20px auto;
max-width: 80%;
position: relative;
z-index: 1;
}

/* STYLE NG VIDEO */
.video-container {
  margin: 50px auto;
  position: relative;
  z-index: 1;
}

video {
  width: 80%;
  max-width: 600px;
  border-radius: 20px;
  border: 3px solid #00ffff;
  box-shadow: 0 0 50px #00ffff, 0 0 80px #ff0080;
}

.thank-you-text {
  font-size: 22px;
  color: #ffffff;
  text-shadow: 0 0 10px #00ffff;
  margin: 30px auto;
}

@keyframes glitterMove {
  0% { transform: translate(0, 0); }
  100% { transform: translate(45px, 45px); }
}

@keyframes glowBg {
  from { box-shadow: inset 0 0 70px 30px rgba(0, 183, 255, 0.3); }
  to { box-shadow: inset 0 0 120px 60px rgba(0, 183, 255, 0.6); }
}

@keyframes textGlow {
  from { text-shadow: 0 0 10px #00ffff, 0 0 20px #0099ff; }
  to { text-shadow: 0 0 20px #00ffff, 0 0 40px #bd00ff, 0 0 60px #ff0080; }
}

</style>
